# ai_agent.yaml — Configuration for the AI agent paper trading mode.
#
# Controls which MCP data sources to use, how the AI reasons about trades,
# and safety constraints.

# ---------------------------------------------------------------------------
# Mode
# ---------------------------------------------------------------------------
# When ai-paper mode is active, the agent uses AI reasoning via MCP tools
# instead of deterministic signal scoring.
# This file is informational — actual mode is set via --mode ai-paper.

# ---------------------------------------------------------------------------
# MCP Data Sources
# ---------------------------------------------------------------------------
mcp:
  # Flash Trade MCP: market prices, pool data, trading overview
  flash_trade:
    enabled: true
    tools:
      - get_trading_overview    # Prices, leverage, pool util for all markets
      - get_prices              # Oracle prices from Pyth Lazer
      - get_pool_data           # AUM, LP stats, custody ratios
    primary_for: [prices, leverage, pool_utilization]

  # HL direct adapter replaces per-MCP data fetching.
  # See adapters/hyperliquid.py for the direct HTTP implementation.
  # Original MCP section removed in favor of direct API calls.

# ---------------------------------------------------------------------------
# AI Reasoning
# ---------------------------------------------------------------------------
ai:
  # How the AI receives market data and produces decisions.
  # "prompt" mode: builds a structured prompt, AI responds with JSON.
  prompt_template: "default"
  # Response provider for automated cron operation.
  # Droid and Hermes are agent/API delegates, not local models. The repo
  # therefore uses a prompt-bound file handoff by default:
  #   1. ai-paper writes accounts/ai/data/ai_prompt.txt + ai_request.json
  #   2. Droid or Hermes writes accounts/ai/data/ai_response.json
  #   3. ai-paper only accepts the response if prompt_id matches
  response_provider: "agent_file"
  agent_file:
    enabled: true
    preferred_agents: ["hermes", "droid"]
    prompt_path: "accounts/ai/data/ai_prompt.txt"
    request_path: "accounts/ai/data/ai_request.json"
    response_path: "accounts/ai/data/ai_response.json"
    # Optional command invoked after prompt/request files are written.
    # The command receives paths via environment variables:
    # IMPERIAL_AI_PROMPT_PATH, IMPERIAL_AI_REQUEST_PATH,
    # IMPERIAL_AI_RESPONSE_PATH, IMPERIAL_AI_PROMPT_ID.
    # Default stub is safe and produces no response until wired to Hermes/Droid.
    bridge_command: "./scripts/ai_delegate_agent.sh"
    bridge_model: "custom:GLM-5.1-[Z.AI-Coding-Plan]---Openai-0"
    bridge_reasoning_effort: "high"
    stale_response_policy: "ignore"
  # Maximum number of trade candidates the AI should produce per scan.
  max_candidates: 3
  # Minimum probability band for a candidate to be considered.
  # "low" = accept all; "medium" = skip low-confidence; "high" = skip medium and low.
  min_probability_band: "low"

# ---------------------------------------------------------------------------
# Repo-local Skills
# ---------------------------------------------------------------------------
skills:
  enabled:
    - core-trader-mandate          # 1. Identity and output format
    - solana-perps-context         # 2. Venue and liquidity constraints
    - market-structure-context     # 3. HTF regime gate and breakout reading lens
    - hawk-breakout                # 4. Breakout signal outputs (AI-readable)
    - hyperliquid-microstructure   # 5. HL-specific microstructure patterns
    - whale-leaderboard-intel      # 6. Whale/leaderboard corroboration
    - risk-execution-rails         # 7. Hard numeric constraints
    - provenance-auditor           # 8. Evidence integrity check
    - outcome-learning             # 9. Prior outcomes context
    - twitter-ct-intel             # 10. Soft CT sentiment
  max_chars_per_skill: 2500
  fail_on_missing_core_skill: true

# ---------------------------------------------------------------------------
# Safety (must match risk.yaml)
# ---------------------------------------------------------------------------
safety:
  # These are enforced by risk.py regardless of AI decisions.
  # Listed here for prompt construction only.
  equity_usd: 1000
  max_risk_pct: 0.20
  leverage_min: 9
  leverage_max: 12
  max_open_trades: 4

# ---------------------------------------------------------------------------
# Fallback
# ---------------------------------------------------------------------------
fallback:
  # If MCP tools are unavailable, fall back to Imperial API data.
  use_imperial_api: true
  # If AI reasoning fails or returns invalid JSON, skip the cycle (no trades).
  on_ai_failure: "skip"
